<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRAccess – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #111827; --border: #1f2d40;
      --accent: #00e5ff; --text: #e2e8f0; --muted: #4b5e72; --danger: #f43f5e;
    }
    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: .4; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, #00e5ff18 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -60%); pointer-events: none;
    }
    .card {
      position: relative; width: 380px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px; padding: 44px 40px 40px;
      box-shadow: 0 0 60px rgba(0,229,255,.06), 0 24px 64px rgba(0,0,0,.6);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .card::before {
      content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); border-radius: 2px;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: white; margin-bottom: 6px; }
    .logo span { color: var(--accent); }
    .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .field input {
      width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,.1); }
    .field input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; margin-top: 8px; padding: 14px; background: var(--accent); color: #0b0f1a;
      border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 14px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .9; } .btn:active { transform: scale(.98); } .btn:disabled { opacity: .4; cursor: not-allowed; }
    .error {
      margin-top: 14px; padding: 10px 14px; background: rgba(244,63,94,.1);
      border: 1px solid rgba(244,63,94,.3); border-radius: 8px; color: var(--danger); font-size: 12px; display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">QR<span>Access</span></div>
    <div class="subtitle">Sistema de Fichaje</div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="off"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••"></div>
    <button class="btn" id="btnLogin">Entrar</button>
    <div class="error" id="error"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDKM2Tp1sosbdAeB6qK8P73cShQ0WP76S4",
      authDomain: "basededatos-dd6b3.firebaseapp.com",
      projectId: "basededatos-dd6b3",
      storageBucket: "basededatos-dd6b3.firebasestorage.app",
      messagingSenderId: "452860965959",
      appId: "1:452860965959:web:42ecb1c31f17e55daa6d62"
    });
    const db = firebase.firestore();

    async function doLogin() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('btnLogin');
      errorEl.classList.remove('show');
      if (!email || !password) { errorEl.textContent = 'Rellena email y contraseña'; errorEl.classList.add('show'); return; }
      btn.disabled = true; btn.textContent = 'Conectando...';
      try {
        const snap = await db.collection('usuarios').where('email','==',email).where('password','==',password).limit(1).get();
        if (snap.empty) {
          errorEl.textContent = 'Email o contraseña incorrectos'; errorEl.classList.add('show');
          btn.disabled = false; btn.textContent = 'Entrar'; return;
        }
        const doc = snap.docs[0]; const u = doc.data();
        localStorage.setItem('user', JSON.stringify({ id: doc.id, email: u.email, nombre: u.nombre || '', rol: u.rol || 'empleado', empresa: u.empresa || '' }));
        window.location.href = u.rol === 'admin' ? 'admin.html' : 'dashboard.html';
      } catch(err) {
        errorEl.textContent = err.code === 'permission-denied' ? 'Error de permisos en Firestore. Revisa las reglas.' : 'Error: ' + err.message;
        errorEl.classList.add('show'); btn.disabled = false; btn.textContent = 'Entrar';
      }
    }
    document.getElementById('btnLogin').addEventListener('click', doLogin);
    ['email','password'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); }));
  </script>
</body>
</html>
