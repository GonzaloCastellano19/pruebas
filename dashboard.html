<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>QRAccess – Fichaje</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
  --border2: #333333; --accent: #e2e2e2; --text: #f0f0f0;
  --text-secondary: #a0a0a0; --muted: #666666;
  --danger: #c0392b; --success: #2d7a4f; --warn: #8a6800;
}
body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px 20px;
}
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; padding: 0 24px; z-index: 10;
}
.logo { font-size: 18px; font-weight: 700; color: var(--text); }
.logo span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); }
.btn-logout { padding: 6px 14px; background: transparent; color: var(--danger); border: 1px solid rgba(192,57,43,.4); border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .2s; }
.btn-logout:hover { background: rgba(192,57,43,.08); border-color: var(--danger); }
.card {
  position: relative; width: 100%; max-width: 420px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 36px 32px 32px; box-shadow: 0 8px 32px rgba(0,0,0,.4);
  animation: fadeUp .5s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.card-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 22px; }
#reader { width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--bg); display: none; }
.status-box { margin-top: 18px; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; display: none; }
.status-box.ok { display: block; background: rgba(45,122,79,.08); border: 1px solid rgba(45,122,79,.2); color: #6ab88a; }
.status-box.err { display: block; background: rgba(192,57,43,.08); border: 1px solid rgba(192,57,43,.2); color: #c0392b; }
.status-box.warn { display: block; background: rgba(138,104,0,.08); border: 1px solid rgba(138,104,0,.2); color: #b8960a; }
.fichaje-hora { font-size: 22px; font-weight: 700; color: var(--accent); margin-top: 6px; letter-spacing: 1px; }
.fichaje-fecha { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.fichaje-detail { font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.7; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text-secondary); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.auto-msg { padding: 28px 16px; text-align: center; font-size: 13px; color: var(--text-secondary); }
.btn-rescan { width: 100%; margin-top: 14px; padding: 12px; background: transparent; color: #a0a0a0; border: 1px solid #2a2a2a; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; display: none; }
.btn-rescan:hover { background: rgba(255,255,255,.04); border-color: #555; }
.btn-rescan.show { display: block; }

/* ── Botón de inicio de escáner ── */
.scan-prompt {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; padding: 8px 0 4px; text-align: center;
}
.scan-prompt-text {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}
.btn-start-scan {
  width: 100%; padding: 14px; background: #e2e2e2; color: #0d0d0d;
  border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background .2s, transform .1s;
}
.btn-start-scan:hover { background: #cacaca; }
.btn-start-scan:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">QR<span>Access</span></div>
  <div class="topbar-right">
    <span id="userLabel">—</span>
    <button class="btn-logout" id="btnLogout">Salir</button>
  </div>
</div>

<div class="card">
  <div class="card-title" id="card-title-text">Escáner de Fichaje</div>
  <div class="card-sub" id="card-sub-text">Apunta la cámara al código QR del departamento</div>
  <!-- Prompt con botón, se muestra/oculta según estado -->
  <div id="scanPrompt" class="scan-prompt" style="display:none">
    <div class="scan-prompt-text">Escanea el código QR de tu departamento para registrar el fichaje.</div>
    <button class="btn-start-scan" id="btnIniciarScan">Abrir cámara y escanear</button>
  </div>
  <!-- El div del scanner, siempre presente pero vacío hasta que se usa -->
  <div id="reader"></div>
  <div class="status-box" id="statusBox">
    <div id="statusMsg"></div>
    <div class="fichaje-hora" id="fichajeHora"></div>
    <div class="fichaje-fecha" id="fichajeDate"></div>
    <div class="fichaje-detail" id="fichajeDetail"></div>
  </div>
  <button class="btn-rescan" id="btnRescan">Escanear de nuevo</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ── Auth guard ────────────────────────────────────────────────────────────
const userRaw = localStorage.getItem('user');
if (!userRaw) location.href = 'index.html';
const user = JSON.parse(userRaw);
document.getElementById('userLabel').textContent = user.nombre || user.email;

// ── Bloquear navegación hacia atrás ───────────────────────────────────────
history.pushState(null, '', location.href);
window.addEventListener('popstate', function() {
  history.pushState(null, '', location.href);
});

// ── Firebase ──────────────────────────────────────────────────────────────
if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey: "AIzaSyDKM2Tp1sosbdAeB6qK8P73cShQ0WP76S4",
    authDomain: "basededatos-dd6b3.firebaseapp.com",
    projectId: "basededatos-dd6b3",
    storageBucket: "basededatos-dd6b3.firebasestorage.app",
    messagingSenderId: "452860965959",
    appId: "1:452860965959:web:42ecb1c31f17e55daa6d62"
  });
}
const db = firebase.firestore();

document.getElementById('btnIniciarScan').addEventListener('click', initScanner);

document.getElementById('btnLogout').addEventListener('click', () => {
  localStorage.removeItem('user'); location.href = 'index.html';
});

const MAX_DISTANCIA_METROS = 200;
const HORAS_JORNADA_NORMAL = 8;

function haversineMetros(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error('Geolocalización no disponible en este navegador')); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      err => {
        if (err.code === err.PERMISSION_DENIED) reject(new Error('Permiso de ubicación denegado'));
        else if (err.code === err.POSITION_UNAVAILABLE) reject(new Error('Ubicación no disponible'));
        else if (err.code === err.TIMEOUT) reject(new Error('Tiempo de espera de ubicación agotado'));
        else reject(new Error('Error de geolocalización: ' + err.message));
      },
      { timeout: 10000, maximumAge: 0 }
    );
  });
}

function showError(msg) {
  const statusBox = document.getElementById('statusBox');
  statusBox.className = 'status-box err';
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('fichajeHora').textContent = '';
  document.getElementById('fichajeDate').textContent = '';
  document.getElementById('fichajeDetail').textContent = '';
  document.getElementById('btnRescan').classList.add('show');
}

function setReaderMsg(html) {
  document.getElementById('reader').innerHTML = `<div class="auto-msg">${html}</div>`;
}

// ── Fichaje automático (con deptId desde URL/sessionStorage) ──────────────
async function procesarFichajeAutomatico(deptId) {
  document.getElementById('card-title-text').textContent = 'Fichaje Automático';
  document.getElementById('card-sub-text').textContent = 'Validando ubicación y registrando fichaje...';
  setReaderMsg('<span class="spinner"></span>Obteniendo tu ubicación...');

  const ahora = new Date();
  const horaStr = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const fechaStr = ahora.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  let empLat = null, empLng = null, locError = null;
  try {
    const pos = await getLocation();
    empLat = pos.lat; empLng = pos.lng;
  } catch(geoErr) {
    locError = geoErr.message;
    setReaderMsg('');
    showError('Debes permitir el acceso a tu ubicación para fichar. ' + geoErr.message);
    return;
  }

  setReaderMsg('<span class="spinner"></span>Verificando departamento...');
  try {
    const deptDoc = await db.collection('departamentos').doc(deptId).get();
    if (!deptDoc.exists) { setReaderMsg(''); showError('QR no válido o departamento eliminado'); return; }
    const dept = deptDoc.data();

    let distanciaDept = null;
    if (dept.lat != null && dept.lng != null) {
      distanciaDept = Math.round(haversineMetros(empLat, empLng, dept.lat, dept.lng));
      if (distanciaDept > MAX_DISTANCIA_METROS) {
        // Guardar registro fallido
        await db.collection('fichajes').add({
          userId: user.id, email: user.email, nombre: user.nombre || '',
          empresa: user.empresa || '', departamento: dept.nombre, departamentoId: deptId,
          tipo: 'fallido', motivo: 'distancia_excedida',
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          timestampCliente: ahora.toISOString(),
          lat: empLat, lng: empLng, distanciaDept,
          horasNormales: null, horasExtra: null, duracionMin: null
        });
        setReaderMsg(''); showError(`No estás cerca del departamento (distancia: ${distanciaDept}m, máximo ${MAX_DISTANCIA_METROS}m)`); return;
      }
    }

    setReaderMsg('<span class="spinner"></span>Guardando fichaje...');

    const ultimoSnap = await db.collection('fichajes')
      .where('userId', '==', user.id)
      .orderBy('timestamp', 'desc')
      .limit(1)
      .get();

    let tipo = 'entrada';
    let duracionMin = null, horasNormales = null, horasExtra = null;
    if (!ultimoSnap.empty && ultimoSnap.docs[0].data().tipo === 'entrada') {
      tipo = 'salida';
      const ultimoTs = ultimoSnap.docs[0].data().timestamp;
      if (ultimoTs && ultimoTs.toDate) {
        duracionMin = Math.round((ahora - ultimoTs.toDate()) / 60000);
        const durHoras = duracionMin / 60;
        horasNormales = Math.min(durHoras, HORAS_JORNADA_NORMAL);
        horasExtra = Math.max(0, durHoras - HORAS_JORNADA_NORMAL);
      }
    }

    await db.collection('fichajes').add({
      userId: user.id, email: user.email, nombre: user.nombre || '',
      empresa: user.empresa || '', departamento: dept.nombre, departamentoId: deptId,
      tipo, timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      timestampCliente: ahora.toISOString(), lat: empLat, lng: empLng,
      locError, distanciaDept, horasNormales, horasExtra, duracionMin
    });

    sessionStorage.removeItem('pendingDept');
    history.replaceState(null, '', 'dashboard.html');

    setReaderMsg('');
    const statusBox = document.getElementById('statusBox');
    const isNoCoords = dept.lat == null || dept.lng == null;
    statusBox.className = isNoCoords ? 'status-box warn' : 'status-box ok';
    let msgParts = [`Fichaje de ${tipo} registrado · ${dept.nombre}`];
    if (isNoCoords) msgParts = [`Fichaje de ${tipo} registrado sin validación de proximidad · ${dept.nombre}`];
    document.getElementById('statusMsg').textContent = msgParts[0];
    document.getElementById('fichajeHora').textContent = horaStr;
    document.getElementById('fichajeDate').textContent = fechaStr;
    let details = [];
    if (distanciaDept != null) details.push(`a ${distanciaDept}m del departamento`);
    if (tipo === 'salida' && duracionMin != null) {
      const hh = Math.floor(duracionMin / 60), mm = duracionMin % 60;
      details.push(`Jornada: ${hh}h ${mm}m`);
      if (horasNormales != null) details.push(`Normales: ${horasNormales.toFixed(2)}h`);
      if (horasExtra != null && horasExtra > 0) details.push(`Extra: ${horasExtra.toFixed(2)}h`);
    }
    document.getElementById('fichajeDetail').innerHTML = details.join('<br>');
  } catch(err) {
    console.error(err);
    setReaderMsg(''); showError('Error al guardar el fichaje: ' + err.message);
  }
  document.getElementById('btnRescan').classList.add('show');
}

// ── Escáner manual ────────────────────────────────────────────────────────
let scanner = null;

function showScanButton() {
  document.getElementById('card-title-text').textContent = 'Escáner de Fichaje';
  document.getElementById('card-sub-text').textContent = 'Pulsa el botón para escanear el código QR';
  document.getElementById('scanPrompt').style.display = 'flex';
  document.getElementById('reader').style.display = 'none';
}

async function initScanner() {
  document.getElementById('scanPrompt').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('reader').innerHTML = '<div class="auto-msg"><span class="spinner"></span>Abriendo cámara...</div>';
  document.getElementById('card-sub-text').textContent = 'Apunta la cámara al código QR del departamento';
  document.getElementById('statusBox').className = 'status-box';
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('fichajeHora').textContent = '';
  document.getElementById('fichajeDate').textContent = '';
  document.getElementById('fichajeDetail').textContent = '';
  document.getElementById('btnRescan').classList.remove('show');

  if (scanner) { try { await scanner.stop(); } catch(_){} scanner = null; }

  // Primero pedimos permiso de cámara explícitamente
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    stream.getTracks().forEach(t => t.stop()); // solo pedimos permiso, luego lo maneja Html5Qrcode
  } catch(permErr) {
    document.getElementById('reader').innerHTML = '';
    document.getElementById('reader').style.display = 'none';
    document.getElementById('scanPrompt').style.display = 'flex';
    showError('Permiso de cámara denegado: ' + permErr.message);
    return;
  }

  document.getElementById('reader').innerHTML = '';
  scanner = new Html5Qrcode('reader');
  try {
    await scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      onScanSuccess,
      () => {}
    );
  } catch(err) {
    try {
      await scanner.start(
        { facingMode: 'user' },
        { fps: 10, qrbox: { width: 240, height: 240 } },
        onScanSuccess,
        () => {}
      );
    } catch(err2) {
      document.getElementById('reader').style.display = 'none';
      document.getElementById('scanPrompt').style.display = 'flex';
      showError('Error al iniciar cámara: ' + err2.message + ' | ' + err2.name);
    }
  }
}

async function onScanSuccess(scannedText) {
  try { await scanner.stop(); } catch(_) {}

  let deptId = scannedText;
  try {
    const u = new URL(scannedText);
    const d = u.searchParams.get('dept');
    if (d) deptId = d;
  } catch(_) {}

  await procesarFichajeConId(deptId);
  document.getElementById('btnRescan').classList.add('show');
}

async function procesarFichajeConId(deptId) {
  const ahora = new Date();
  const horaStr = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const fechaStr = ahora.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  let empLat = null, empLng = null, locError = null;
  try {
    const pos = await getLocation();
    empLat = pos.lat; empLng = pos.lng;
  } catch(geoErr) {
    locError = geoErr.message;
  }

  try {
    const deptDoc = await db.collection('departamentos').doc(deptId).get();
    if (!deptDoc.exists) { showError('QR no válido o departamento eliminado'); return; }
    const dept = deptDoc.data();

    let distanciaDept = null;
    if (empLat != null && dept.lat != null && dept.lng != null) {
      distanciaDept = Math.round(haversineMetros(empLat, empLng, dept.lat, dept.lng));
      if (distanciaDept > MAX_DISTANCIA_METROS) {
        await db.collection('fichajes').add({
          userId: user.id, email: user.email, nombre: user.nombre || '',
          empresa: user.empresa || '', departamento: dept.nombre, departamentoId: deptId,
          tipo: 'fallido', motivo: 'distancia_excedida',
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          timestampCliente: ahora.toISOString(),
          lat: empLat, lng: empLng, distanciaDept,
          horasNormales: null, horasExtra: null, duracionMin: null
        });
        showError(`No estás cerca del departamento (distancia: ${distanciaDept}m, máximo ${MAX_DISTANCIA_METROS}m)`); return;
      }
    }

    const ultimoSnap = await db.collection('fichajes')
      .where('userId', '==', user.id)
      .orderBy('timestamp', 'desc')
      .limit(1)
      .get();

    let tipo = 'entrada';
    let duracionMin = null, horasNormales = null, horasExtra = null;
    if (!ultimoSnap.empty && ultimoSnap.docs[0].data().tipo === 'entrada') {
      tipo = 'salida';
      const ultimoTs = ultimoSnap.docs[0].data().timestamp;
      if (ultimoTs && ultimoTs.toDate) {
        duracionMin = Math.round((ahora - ultimoTs.toDate()) / 60000);
        const durHoras = duracionMin / 60;
        horasNormales = Math.min(durHoras, HORAS_JORNADA_NORMAL);
        horasExtra = Math.max(0, durHoras - HORAS_JORNADA_NORMAL);
      }
    }

    await db.collection('fichajes').add({
      userId: user.id, email: user.email, nombre: user.nombre || '',
      empresa: user.empresa || '', departamento: dept.nombre, departamentoId: deptId,
      tipo, timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      timestampCliente: ahora.toISOString(), lat: empLat, lng: empLng,
      locError, distanciaDept, horasNormales, horasExtra, duracionMin
    });

    const statusBox = document.getElementById('statusBox');
    statusBox.className = 'status-box ok';
    document.getElementById('statusMsg').textContent = `Fichaje de ${tipo} registrado · ${dept.nombre}`;
    document.getElementById('fichajeHora').textContent = horaStr;
    document.getElementById('fichajeDate').textContent = fechaStr;
    let details = [];
    if (distanciaDept != null) details.push(`a ${distanciaDept}m del departamento`);
    if (tipo === 'salida' && duracionMin != null) {
      const hh = Math.floor(duracionMin / 60), mm = duracionMin % 60;
      details.push(`Jornada: ${hh}h ${mm}m`);
      if (horasNormales != null) details.push(`Normales: ${horasNormales.toFixed(2)}h`);
      if (horasExtra != null && horasExtra > 0) details.push(`Extra: ${horasExtra.toFixed(2)}h`);
    }
    document.getElementById('fichajeDetail').innerHTML = details.join('<br>');
  } catch(err) {
    console.error(err); showError('Error al guardar el fichaje: ' + err.message);
  }
}

// ── Botón "Escanear de nuevo" ─────────────────────────────────────────────
document.getElementById('btnRescan').addEventListener('click', async () => {
  const urlParams = new URLSearchParams(window.location.search);
  const deptId = urlParams.get('dept') || sessionStorage.getItem('pendingDept');
  if (deptId) {
    document.getElementById('btnRescan').classList.remove('show');
    procesarFichajeAutomatico(deptId);
  } else {
    document.getElementById('statusBox').className = 'status-box';
    document.getElementById('btnRescan').classList.remove('show');
    if (scanner) { try { await scanner.stop(); } catch(_){} scanner = null; }
    showScanButton();
  }
});

// ── Inicio ────────────────────────────────────────────────────────────────
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const deptId = urlParams.get('dept') || sessionStorage.getItem('pendingDept');
  if (deptId) {
    procesarFichajeAutomatico(deptId);
  } else {
    showScanButton();
  }
})();
</script>
</body>
</html>
