<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRAccess – Fichaje</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #111827; --border: #1f2d40;
      --accent: #00e5ff; --text: #e2e8f0; --muted: #4b5e72;
      --danger: #f43f5e; --success: #10b981;
    }
    body {
      font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 40px 40px; opacity: .35; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle,#00e5ff15 0%,transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-60%); pointer-events: none;
    }
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(17,24,39,.95); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px); display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px; z-index: 10;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: white; }
    .logo span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--muted); }
    .card {
      position: relative; width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 36px 32px 32px; box-shadow: 0 0 60px rgba(0,229,255,.06),0 24px 64px rgba(0,0,0,.6);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .card::before { content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 2px; background: linear-gradient(90deg,transparent,var(--accent),transparent); border-radius: 2px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; }
    .card-sub { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 22px; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--bg); }
    .status-box { margin-top: 18px; padding: 16px; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; }
    .status-box.ok   { display: block; background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.3); color: var(--success); }
    .status-box.err  { display: block; background: rgba(244,63,94,.1);   border: 1px solid rgba(244,63,94,.3);  color: var(--danger); }
    .status-box.warn { display: block; background: rgba(245,158,11,.1);  border: 1px solid rgba(245,158,11,.3); color: #f59e0b; }
    .fichaje-hora   { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); margin-top: 6px; letter-spacing: 1px; }
    .fichaje-fecha  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .fichaje-detail { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.7; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auto-msg { padding: 28px 16px; text-align: center; font-size: 13px; color: var(--muted); }
    .btn-rescan { width: 100%; margin-top: 14px; padding: 12px; background: transparent; color: var(--accent); border: 1px solid rgba(0,229,255,.3); border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background .2s; display: none; }
    .btn-rescan:hover { background: rgba(0,229,255,.08); }
    .btn-rescan.show { display: block; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">QR<span>Access</span></div>
    <div class="topbar-right">
      <span id="userLabel">Kiosco</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Escáner de Fichaje</div>
    <div class="card-sub">Escanea el QR personal del empleado</div>
    <div id="reader"></div>
    <div class="status-box" id="statusBox">
      <div id="statusMsg"></div>
      <div class="fichaje-hora"   id="fichajeHora"></div>
      <div class="fichaje-fecha"  id="fichajeDate"></div>
      <div class="fichaje-detail" id="fichajeDetail"></div>
    </div>
    <button class="btn-rescan show" id="btnRescan">Escanear de nuevo</button>
  </div>

  <script>
    // ── Helpers UI ─────────────────────────────────────────────────────────────
    function showResult(type, msg, hora, fecha, details) {
      const box = document.getElementById('statusBox');
      box.className = 'status-box ' + type;
      document.getElementById('statusMsg').textContent   = msg;
      document.getElementById('fichajeHora').textContent = hora  || '';
      document.getElementById('fichajeDate').textContent = fecha || '';
      document.getElementById('fichajeDetail').innerHTML = details || '';
      document.getElementById('btnRescan').classList.add('show');
    }

    function setReaderMsg(html) {
      document.getElementById('reader').innerHTML = `<div class="auto-msg">${html}</div>`;
    }

    // ── Escáner ────────────────────────────────────────────────────────────────
    let scanner = null;

    function initScanner() {
      document.getElementById('statusBox').className = 'status-box';
      document.getElementById('statusMsg').textContent    = '';
      document.getElementById('fichajeHora').textContent  = '';
      document.getElementById('fichajeDate').textContent  = '';
      document.getElementById('fichajeDetail').textContent = '';
      document.getElementById('btnRescan').classList.remove('show');

      if (scanner) { try { scanner.clear(); } catch(_){} }

      scanner = new Html5QrcodeScanner('reader', {
        fps: 10,
        qrbox: { width: 240, height: 240 },
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true
      }, false);

      scanner.render(onScanSuccess, () => {});
    }

    async function onScanSuccess(scannedText) {
      try { await scanner.clear(); } catch(_) {}
      setReaderMsg('<span class="spinner"></span>Procesando...');
      await procesarFichaje(scannedText.trim());
    }

    // ── Procesar fichaje ───────────────────────────────────────────────────────
    async function procesarFichaje(qr_token) {
      const ahora    = new Date();
      const horaStr  = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const fechaStr = ahora.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      // Geolocalización (best-effort)
      let ubicacion = '';
      try {
        const pos = await new Promise((res, rej) => {
          if (!navigator.geolocation) { rej(new Error('no disponible')); return; }
          navigator.geolocation.getCurrentPosition(
            p  => res({ lat: p.coords.latitude, lng: p.coords.longitude }),
            e  => rej(e),
            { timeout: 6000, maximumAge: 0 }
          );
        });
        ubicacion = `${pos.lat},${pos.lng}`;
      } catch(_) {}

      try {
        const res = await fetch('/api/checkin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qr_token, ubicacion })
        });

        const data = await res.json();
        setReaderMsg('');

        if (!res.ok) {
          showResult('err', '❌ ' + (data.error || 'Error desconocido'), '', '', '');
          return;
        }

        const isEntrada = data.direction === 'IN';
        const emoji = isEntrada ? '✅ Entrada registrada' : '🔚 Salida registrada';

        const details = [
          `👤 ${data.usuario}`,
          `🏢 ${data.empresa}`,
          `🏷️ ${data.departamento}`
        ];
        if (ubicacion) details.push(`📍 Ubicación registrada`);

        showResult('ok', emoji, horaStr, fechaStr, details.join('<br>'));

      } catch(err) {
        setReaderMsg('');
        showResult('err', '❌ Error de conexión: ' + err.message, '', '', '');
      }
    }

    // ── Botón rescanear ────────────────────────────────────────────────────────
    document.getElementById('btnRescan').addEventListener('click', initScanner);

    // ── Inicio ─────────────────────────────────────────────────────────────────
    initScanner();
  </script>
</body>
</html>
