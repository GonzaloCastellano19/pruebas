<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRAccess – Fichaje</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0b0f1a;
      --surface: #111827;
      --border:  #1f2d40;
      --accent:  #00e5ff;
      --text:    #e2e8f0;
      --muted:   #4b5e72;
      --danger:  #f43f5e;
      --success: #10b981;
    }
    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 20px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .4;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #00e5ff18 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(17,24,39,.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }
    .topbar .logo {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: white;
    }
    .topbar .logo span { color: var(--accent); }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .btn-logout {
      padding: 6px 14px;
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(244,63,94,.3);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-logout:hover { background: rgba(244,63,94,.1); border-color: var(--danger); }
    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px 32px;
      box-shadow: 0 0 60px rgba(0,229,255,.06), 0 24px 64px rgba(0,0,0,.6);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .status-box {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .status-box.ok {
      display: block;
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.3);
      color: var(--success);
    }
    .status-box.err {
      display: block;
      background: rgba(244,63,94,.1);
      border: 1px solid rgba(244,63,94,.3);
      color: var(--danger);
    }
    .btn-rescan {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,.3);
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
      display: none;
    }
    .btn-rescan:hover { background: rgba(0,229,255,.08); border-color: var(--accent); }
    .btn-rescan.show  { display: block; }
    .timestamp {
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">QR<span>Access</span></div>
    <div class="user-info">
      <span id="userLabel">—</span>
      <button class="btn-logout" id="btnLogout">Salir</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Escáner de Fichaje</div>
    <div class="card-sub">Apunta la cámara al código QR</div>
    <div id="reader"></div>
    <div class="status-box" id="statusBox"></div>
    <button class="btn-rescan" id="btnRescan">Escanear de nuevo</button>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <!-- Firebase SDK compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // ── Protección de ruta ───────────────────────────────────────────────────
    const userRaw = localStorage.getItem('user');
    if (!userRaw) { window.location.href = 'index.html'; }
    const user = JSON.parse(userRaw);
    document.getElementById('userLabel').textContent = user.nombre || user.email;

    // ── Firebase ─────────────────────────────────────────────────────────────
    // Evitar doble inicialización si ya está inicializado
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            "AIzaSyDKM2Tp1sosbdAeB6qK8P73cShQ0WP76S4",
        authDomain:        "basededatos-dd6b3.firebaseapp.com",
        projectId:         "basededatos-dd6b3",
        storageBucket:     "basededatos-dd6b3.firebasestorage.app",
        messagingSenderId: "452860965959",
        appId:             "1:452860965959:web:42ecb1c31f17e55daa6d62"
      });
    }
    const db = firebase.firestore();

    // ── Logout ───────────────────────────────────────────────────────────────
    document.getElementById('btnLogout').addEventListener('click', () => {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    });

    // ── Escáner QR ───────────────────────────────────────────────────────────
    const statusBox  = document.getElementById('statusBox');
    const btnRescan  = document.getElementById('btnRescan');
    const timestampEl = document.getElementById('timestamp');
    let scanner = null;

    function initScanner() {
      statusBox.className  = 'status-box';
      statusBox.textContent = '';
      btnRescan.classList.remove('show');
      timestampEl.textContent = '';

      // Limpiar instancia anterior si existe
      if (scanner) {
        try { scanner.clear(); } catch(_) {}
      }

      scanner = new Html5QrcodeScanner('reader', {
        fps: 10,
        qrbox: { width: 240, height: 240 },
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true
      }, /* verbose= */ false);

      scanner.render(onScanSuccess, () => {});
    }

    async function onScanSuccess(decodedText) {
      // Parar escáner
      try { await scanner.clear(); } catch(_) {}

      const now = new Date();
      timestampEl.textContent = `🕐 ${now.toLocaleDateString('es-ES')} · ${now.toLocaleTimeString('es-ES')}`;

      try {
        // Determinar tipo: si el último fichaje fue entrada → ahora es salida
        const ultimoSnap = await db.collection('fichajes')
          .where('userId', '==', user.id)
          .orderBy('timestamp', 'desc')
          .limit(1)
          .get();

        let tipo = 'entrada';
        if (!ultimoSnap.empty && ultimoSnap.docs[0].data().tipo === 'entrada') {
          tipo = 'salida';
        }

        // Guardar fichaje en Firestore
        await db.collection('fichajes').add({
          userId:    user.id,
          email:     user.email,
          nombre:    user.nombre   || '',
          empresa:   user.empresa  || '',
          qr:        decodedText,
          tipo,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        statusBox.className   = 'status-box ok';
        statusBox.textContent = `✅ Fichaje de ${tipo} registrado correctamente`;

      } catch (err) {
        console.error(err);
        statusBox.className   = 'status-box err';
        statusBox.textContent = '❌ Error al guardar el fichaje: ' + err.message;
      }

      btnRescan.classList.add('show');
    }

    document.getElementById('btnRescan').addEventListener('click', initScanner);

    // Arrancar al cargar
    initScanner();
  </script>
</body>
</html>
