<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fichaje QR – Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #111827; --border: #1f2d40;
      --accent: #00e5ff; --text: #e2e8f0; --muted: #4b5e72; --danger: #f43f5e;
    }
    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: .4; pointer-events: none;
    }
    .card {
      position: relative; width: 380px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px; padding: 44px 40px 40px;
      box-shadow: 0 0 60px rgba(0,229,255,.06), 0 24px 64px rgba(0,0,0,.6);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .card::before {
      content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); border-radius: 2px;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: white; margin-bottom: 6px; }
    .logo span { color: var(--accent); }
    .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .field input {
      width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,.1); }
    .field input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; margin-top: 8px; padding: 14px; background: var(--accent); color: #0b0f1a;
      border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 14px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .9; } .btn:active { transform: scale(.98); } .btn:disabled { opacity: .4; cursor: not-allowed; }
    .error {
      margin-top: 14px; padding: 10px 14px; background: rgba(244,63,94,.1);
      border: 1px solid rgba(244,63,94,.3); border-radius: 8px; color: var(--danger); font-size: 12px; display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Fichaje<span>QR</span></div>
    <div class="subtitle">Sistema de Fichaje</div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btnLogin">Entrar</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error');
      const btn      = document.getElementById('btnLogin');

      errorEl.classList.remove('show');
      if (!username || !password) {
        errorEl.textContent = 'Rellena usuario y contraseña';
        errorEl.classList.add('show');
        return;
      }

      btn.disabled = true; btn.textContent = 'Conectando...';

      try {
        let lat = null, lng = null;
        if (navigator.geolocation) {
          await new Promise(res => navigator.geolocation.getCurrentPosition(
            p => { lat = p.coords.latitude; lng = p.coords.longitude; res(); },
            () => res(),
            { timeout: 3000 }
          ));
        }

        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, lat, lng })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = data.rol === 'admin' ? '/admin' : '/';
        } else {
          errorEl.textContent = data.error || 'Credenciales incorrectas';
          errorEl.classList.add('show');
        }
      } catch (_) {
        errorEl.textContent = 'Error de conexión con el servidor';
        errorEl.classList.add('show');
      }

      btn.disabled = false; btn.textContent = 'Entrar';
    }

    document.getElementById('btnLogin').addEventListener('click', doLogin);
    ['username', 'password'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
    );
  </script>
</body>
</html>
