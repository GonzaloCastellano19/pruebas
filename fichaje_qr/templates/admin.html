<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin – Fichaje</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header a { color: #94a3b8; font-size: 0.85rem; text-decoration: none; }
    header a:hover { color: white; }

    main { max-width: 960px; margin: 0 auto; padding: 32px 20px; display: flex; flex-direction: column; gap: 32px; }

    /* ── Sección ── */
    section { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
    .section-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h2 { font-size: 1rem; font-weight: 600; }

    /* ── Formulario ── */
    .form-row { display: flex; gap: 8px; padding: 16px 24px; }
    input[type="text"] {
      flex: 1; padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #3b82f6; }
    button {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; font-size: 0.8rem; padding: 5px 10px; }
    .btn-danger:hover { background: #fee2e2; }

    /* ── Tabla ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { padding: 10px 24px; text-align: left; font-size: 0.75rem; font-weight: 600;
         text-transform: uppercase; letter-spacing: 0.05em; color: #64748b;
         background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 24px; border-bottom: 1px solid #f1f5f9; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 9999px; font-size: 0.75rem; font-weight: 600;
    }
    .badge-in  { background: #dcfce7; color: #16a34a; }
    .badge-out { background: #dbeafe; color: #2563eb; }

    /* ── Filtros ── */
    .filters { display: flex; gap: 8px; padding: 16px 24px; flex-wrap: wrap; }
    .filters input[type="date"],
    .filters select {
      padding: 8px 12px; border-radius: 8px;
      border: 1px solid #cbd5e1; font-size: 0.85rem; outline: none;
    }
    .filters input:focus, .filters select:focus { border-color: #3b82f6; }

    .qr-link { color: #3b82f6; text-decoration: none; font-size: 0.82rem; }
    .qr-link:hover { text-decoration: underline; }

    .token-mono { font-family: monospace; font-size: 0.78rem; color: #64748b; }

    #msg { padding: 10px 24px; font-size: 0.85rem; border-top: 1px solid #e2e8f0; color: #16a34a; }
    #msg.error { color: #dc2626; }

    .empty { padding: 32px; text-align: center; color: #94a3b8; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <h1>Panel de Administración — Fichaje QR</h1>
  <a href="/">← Ir al kiosco</a>
</header>

<main>

  <!-- ── Empleados ── -->
  <section>
    <div class="section-header"><h2>Empleados</h2></div>

    <div class="form-row">
      <input id="new-name" type="text" placeholder="Nombre del empleado" maxlength="100">
      <button class="btn-primary" onclick="createEmployee()">Crear empleado</button>
    </div>
    <div id="msg" hidden></div>

    <table id="emp-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Token QR</th>
          <th>Alta</th>
          <th>QR</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="emp-body">
        <tr><td colspan="5" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </section>

  <!-- ── Fichajes ── -->
  <section>
    <div class="section-header"><h2>Registro de fichajes</h2></div>

    <div class="filters">
      <input type="date" id="f-date" oninput="loadCheckins()">
      <select id="f-emp" onchange="loadCheckins()">
        <option value="">Todos los empleados</option>
      </select>
      <button class="btn-primary" onclick="exportCSV()">Exportar CSV</button>
    </div>

    <table>
      <thead>
        <tr><th>Empleado</th><th>Dirección</th><th>Fecha y hora</th></tr>
      </thead>
      <tbody id="checkin-body">
        <tr><td colspan="3" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </section>

</main>

<script>
  // ── Empleados ───────────────────────────────────────────────
  async function loadEmployees() {
    const res  = await fetch("/api/employees");
    const data = await res.json();
    const tbody = document.getElementById("emp-body");

    // Actualiza select de filtros
    const sel = document.getElementById("f-emp");
    const prev = sel.value;
    sel.innerHTML = '<option value="">Todos los empleados</option>';
    data.forEach(e => {
      const o = document.createElement("option");
      o.value = e.id; o.textContent = e.name;
      sel.appendChild(o);
    });
    sel.value = prev;

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Sin empleados todavía</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(e => `
      <tr>
        <td><strong>${esc(e.name)}</strong></td>
        <td><span class="token-mono">${esc(e.qr_token)}</span></td>
        <td>${esc(e.created_at)}</td>
        <td><a class="qr-link" href="/api/employees/${e.id}/qr" target="_blank">Descargar QR</a></td>
        <td>
          <button class="btn-danger"
            onclick="deleteEmployee(${e.id}, '${esc(e.name)}')">Eliminar</button>
        </td>
      </tr>
    `).join("");
  }

  async function createEmployee() {
    const input = document.getElementById("new-name");
    const name  = input.value.trim();
    if (!name) return showMsg("Escribe un nombre", true);

    const res  = await fetch("/api/employees", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name })
    });
    const data = await res.json();

    if (res.ok) {
      input.value = "";
      showMsg(`Empleado "${data.employee.name}" creado. Token: ${data.employee.qr_token}`);
      loadEmployees();
    } else {
      showMsg(data.error || "Error al crear", true);
    }
  }

  async function deleteEmployee(id, name) {
    if (!confirm(`¿Eliminar a "${name}" y todos sus fichajes?`)) return;
    await fetch(`/api/employees/${id}`, { method: "DELETE" });
    loadEmployees();
    loadCheckins();
  }

  // ── Fichajes ────────────────────────────────────────────────
  let lastCheckins = [];

  async function loadCheckins() {
    const date = document.getElementById("f-date").value;
    const emp  = document.getElementById("f-emp").value;
    let url    = "/api/checkins?";
    if (date) url += `date=${date}&`;
    if (emp)  url += `employee_id=${emp}&`;

    const res  = await fetch(url);
    lastCheckins = await res.json();

    const tbody = document.getElementById("checkin-body");
    if (!lastCheckins.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">Sin fichajes para estos filtros</td></tr>';
      return;
    }
    tbody.innerHTML = lastCheckins.map(c => `
      <tr>
        <td>${esc(c.employee)}</td>
        <td><span class="badge badge-${c.direction.toLowerCase()}">${c.direction}</span></td>
        <td>${esc(c.ts)}</td>
      </tr>
    `).join("");
  }

  function exportCSV() {
    if (!lastCheckins.length) return alert("No hay datos para exportar");
    const rows = [["Empleado","Dirección","Fecha y hora"]];
    lastCheckins.forEach(c => rows.push([c.employee, c.direction, c.ts]));
    const csv  = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href  = URL.createObjectURL(blob);
    link.download = `fichajes_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
  }

  // ── Helpers ─────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function showMsg(text, isError = false) {
    const el = document.getElementById("msg");
    el.hidden = false;
    el.className = isError ? "error" : "";
    el.textContent = text;
    setTimeout(() => { el.hidden = true; }, 4000);
  }

  // ── Arranque ─────────────────────────────────────────────────
  loadEmployees();
  loadCheckins();
  setInterval(() => { loadEmployees(); loadCheckins(); }, 15000);
</script>
</body>
</html>
